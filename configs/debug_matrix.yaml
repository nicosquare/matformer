# Debug-size MatFormer reproduction matrix.
# Phase 2 will implement config loading and validation for these fields.
run:
  phase_id: debug_matrix
  seed: 42
  output_root: outputs

model:
  base_model_name: debug-llama
  paper_aligned: false
  num_layers: 4
  num_attention_heads: 4
  hidden_size: 256
  intermediate_size: 1024
  context_length: 256
  vocab_size_assumption: 32000
  granularities: [s, m, l, xl]

training:
  token_budget: 1000000
  max_steps: 1000
  batch_size_per_process: 8
  learning_rate: 0.0001
  warmup_steps: 50
  eval_interval: 100
  mixed_precision: bf16
  activation_checkpointing: true

dataset:
  dataset_name: tiny-stories
  dataset_split: train
  dataset_phase: debug
  sample_limit: 10000
  preprocessing_notes: truncate_or_pad_to_context_length

matrix:
  nested:
    run_id: debug-nested-001
    model_family: nested
    model_size_label: debug
    completion_label: debug
    granularities: [s, m, l, xl]
  standalone:
    - run_id: debug-standalone-s-001
      model_family: standalone
      model_size_label: debug
      completion_label: debug
      granularity: s
    - run_id: debug-standalone-m-001
      model_family: standalone
      model_size_label: debug
      completion_label: debug
      granularity: m
    - run_id: debug-standalone-l-001
      model_family: standalone
      model_size_label: debug
      completion_label: debug
      granularity: l
    - run_id: debug-standalone-xl-001
      model_family: standalone
      model_size_label: debug
      completion_label: debug
      granularity: xl

outputs:
  save_config: true
  save_metrics_csv: true
  save_run_summary_json: true
  save_checkpoints: true
  make_plots: true

evaluation:
  validation: true
  downstream_suite: []
  consistency: false
  speculative: false
