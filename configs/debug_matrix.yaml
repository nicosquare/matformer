# Debug-size MatFormer reproduction matrix for Phase 3 validation.
run:
  phase_id: debug_matrix
  seed: 42
  output_root: outputs
  continuation:
    enabled: false

model:
  base_model_name: debug-llama
  variant: matformer_llama
  correction_mode: gmc
  membership_correction: true
  tokenizer_name: hf-internal-testing/llama-tokenizer
  d_model: 128
  num_layers: 2
  num_attention_heads: 4
  context_length: 64
  vocab_size_assumption: 32000
  granularities: [s, m, l, xl]
  granularity_prefixes:
    s: 0.125
    m: 0.25
    l: 0.5
    xl: 1.0

training:
  token_budget: 8192
  max_steps: 4
  batch_size_per_process: 2
  learning_rate: 0.0003
  warmup_steps: 0
  # Pre-nested warmup is separate from scheduler warmup.
  # Nested runs can use it to warm the model before block slicing/splitting.
  pre_nested_warmup:
    enabled: false
    # Duration is applied only when warmup is enabled.
    duration: 0
    # Use epochs for longer runs or steps for short debug runs.
    unit: epochs
  gradient_clip_norm: 1.0
  optimizer:
    preset: adam
  eval_interval: 2
  eval_batches: 1
  mixed_precision: none
  activation_checkpointing: false
  granularity_sampling: all
  preprocess_num_proc: 1
  dataloader_num_workers: 0
  scheduler:
    name: cosine

dataset:
  dataset_name: roneneldan/TinyStories
  dataset_split: train
  dataset_phase: debug
  sample_limit: 16
  preprocessing_notes: truncate_or_pad_to_context_length_64_debug_samples

matrix:
  nested:
    run_id: debug-nested-001
    model_family: nested
    sampling_mode: nested-all
    model_size_label: debug
    granularities: [s, m, l, xl]
  standalone:
    - run_id: debug-standalone-s-001
      model_family: standalone
      sampling_mode: standalone
      model_size_label: debug
      granularity: s
    - run_id: debug-standalone-m-001
      model_family: standalone
      sampling_mode: standalone
      model_size_label: debug
      granularity: m
    - run_id: debug-standalone-l-001
      model_family: standalone
      sampling_mode: standalone
      model_size_label: debug
      granularity: l
    - run_id: debug-standalone-xl-001
      model_family: standalone
      sampling_mode: standalone
      model_size_label: debug
      granularity: xl

outputs:
  save_config: true
  save_metrics_csv: true
  save_run_summary_json: true
  save_checkpoints: false
  make_plots: false

monitoring:
  enabled: false
  backend: wandb
  project: debug_matrix
  job_type: train
  tags: [debug, matrix]
  notes: debug matrix smoke and warmup validation
  log_loss_by_granularity: true
  log_validation_loss: true
  log_stage_events: true

evaluation:
  validation: true
  downstream_suite: []
  consistency: false
  speculative: false
