# d_model=256 MatFormer-Llama/SwiGLU pilot comparison using a reduced
# training-token budget.
run:
  run_id: dmodel256-pilot-comparison-001
  phase_id: dmodel256_pilot_comparison
  model_family: nested
  sampling_mode: nested-random
  model_shape_label: dmodel256
  seed: 42
  output_root: outputs
  continuation:
    enabled: true
    latest_checkpoint_save_interval_steps: 0
    latest_checkpoint_save_on_validation: true
    latest_checkpoint_save_on_completion: true

model:
  base_model_name: dmodel256-matformer-llama-swiglu
  variant: matformer_llama
  correction_mode: gmc
  membership_correction: true
  tokenizer_name: hf-internal-testing/llama-tokenizer
  d_model: 256
  num_layers: 16
  num_attention_heads: 16
  context_length: 1024
  vocab_size_assumption: 256000
  granularities: [s, m, l, xl]
  granularity_prefixes:
    s: 0.125
    m: 0.25
    l: 0.5
    xl: 1.0

training:
  token_budget: 100000000
  max_steps_cap: null
  batch_size_per_process: 4
  learning_rate: 0.0003
  learning_rate_scale_rule: linear
  warmup_steps: 2000 # This flag overrules ratio. We set this for small experiments (e.g. up to 100M tokens), for larger experiments we set warmup_ratio instead (comment this)
  warmup_ratio: 0.01635
  # Pre-nested warmup is separate from scheduler warmup.
  # Nested runs can use it to warm the model before block slicing/splitting.
  pre_nested_warmup:
    enabled: false
    # Duration is applied only when warmup is enabled.
    duration: 0
    # Use epochs for longer runs or steps for short debug runs.
    unit: epochs
  gradient_clip_norm: 1.0
  eval_interval: 500
  mixed_precision: bf16
  activation_checkpointing: true
  optimizer:
    preset: adam
    name: adamw
    kwargs:
      betas: [0.9, 0.95]
      eps: 1.0e-8
      weight_decay: 0.1
  scheduler:
    name: cosine
  distributed:
    strategy: fsdp
    fsdp:
      sharding_strategy: full_shard
      auto_wrap_policy: transformer_based_wrap
      transformer_layer_cls_to_wrap:
        - LlamaDecoderLayer
      backward_prefetch: backward_pre
      use_orig_params: true
      sync_module_states: true
      forward_prefetch: false

dataset:
  dataset_name: HuggingFaceFW/fineweb
  dataset_config_name: sample-10BT
  dataset_split: train
  dataset_phase: medium
  sample_limit: null
  preprocessing_notes: truncate_or_pad_to_context_length

outputs:
  save_config: true
  save_metrics_csv: true
  save_run_summary_json: true
  save_checkpoints: true
  make_plots: true

monitoring:
  enabled: false
  backend: wandb
  project: dmodel256_pilot_comparison
  job_type: train
  tags: [pilot, dmodel256]
  notes: d_model=256 pilot comparison
  log_loss_by_granularity: true
  log_validation_loss: true
  log_stage_events: true

evaluation:
  validation: true
  downstream_suite:
    - suite_id: minimal-downstream
      suite_type: downstream
      tool: lm-eval
      tasks:
        - hellaswag
        - piqa
        - arc_challenge
        - boolq
        - winogrande
        - openbookqa
      metric_name: accuracy
      metric_candidates:
        - acc_norm,none
        - acc,none
        - exact_match,none
        - acc_norm
        - acc
        - accuracy
      model: hf
      model_args: {}
      batch_size: auto
      num_fewshot: 0
      limit: null
  consistency: false
  speculative: false
