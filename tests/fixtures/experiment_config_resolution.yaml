# Shared fixture for experiment config resolution tests.
run:
  run_id: experiment-config-resolution-001
  phase_id: experiment_config_resolution
  model_family: nested
  model_size_label: debug
  seed: 42
  output_root: outputs
  continuation:
    enabled: false

model:
  base_model_name: debug-llama
  variant: cat_llama
  correction_mode: gmc
  membership_correction: true
  tokenizer_name: hf-internal-testing/llama-tokenizer
  d_model: 128
  num_layers: 2
  num_attention_heads: 4
  context_length: 64
  vocab_size_assumption: 32000
  granularities: [s, m, l, xl]
  granularity_prefixes:
    s: 0.125
    m: 0.25
    l: 0.5
    xl: 1.0

training:
  token_budget: 8192
  max_steps: 4
  batch_size_per_process: 2
  learning_rate: 0.0003
  warmup_steps: 0
  pre_nested_warmup:
    enabled: false
    duration: 0
    unit: epochs
  gradient_clip_norm: 1.0
  optimizer:
    preset: adam
    name: adamw
    kwargs:
      betas: [0.9, 0.95]
      eps: 1.0e-8
      weight_decay: 0.1
  eval_interval: 2
  eval_batches: 1
  mixed_precision: none
  activation_checkpointing: false
  granularity_sampling: all
  preprocess_num_proc: 1
  dataloader_num_workers: 0
  scheduler:
    name: cosine

dataset:
  dataset_name: roneneldan/TinyStories
  dataset_split: train
  dataset_phase: debug
  sample_limit: 16
  preprocessing_notes: truncate_or_pad_to_context_length_64_debug_samples

outputs:
  save_config: true
  save_metrics_csv: true
  save_run_summary_json: true
  save_checkpoints: false
  make_plots: false

monitoring:
  enabled: false
  backend: wandb
  project: experiment_config_resolution
  job_type: train
  tags: [debug, config-resolution]
  notes: shared fixture for config resolution tests
  log_loss_by_granularity: true
  log_validation_loss: true
  log_stage_events: true

evaluation:
  validation: true
  downstream_suite: []
  consistency: false
  speculative: false
